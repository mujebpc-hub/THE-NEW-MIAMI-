<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mato Runner</title>

<link rel="stylesheet" href="style.css">

<!-- Three.js -->
<script src="https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.min.js"></script>
</head>

<body>

<!-- Loading Screen -->
<div id="loadingScreen">
    <h1>MATO RUNNER</h1>
    <p>Loading...</p>
</div>

<!-- Main Menu -->
<div id="menu">
    <h1>MATO RUNNER</h1>

    <button id="playBtn">PLAY</button>
    <button id="howBtn">HOW TO PLAY</button>
</div>

<!-- Instructions -->
<div id="howToPlay" class="hidden">
    <h2>HOW TO PLAY</h2>

    <p>⬅ Move Left</p>
    <p>➡ Move Right</p>
    <p>⬆ Jump</p>
    <p>⬇ Slide</p>

    <button id="backBtn">BACK</button>
</div>

<!-- HUD -->
<div id="hud" class="hidden">

    <div id="score">
        Score: 0
    </div>

    <div id="coins">
        Coins: 0
    </div>

</div>

<!-- Game Over -->
<div id="gameOver" class="hidden">

    <h1>GAME OVER</h1>

    <div id="finalScore">
        Score: 0
    </div>

    <button id="restartBtn">
        RESTART
    </button>

</div>

<!-- Game Canvas -->
<div id="gameContainer"></div>

<script src="game.js"></script>

</body>
</html>
