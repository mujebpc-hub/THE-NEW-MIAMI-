<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rail Rush Runner</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="game-shell">
    <canvas id="gameCanvas" aria-label="Rail Rush Runner game"></canvas>

    <section id="menu" class="panel menu-panel">
      <p class="tour">World Tour</p>
      <h1>Rail Rush<br>Runner</h1>
      <p class="subtitle">Swipe or use arrow keys to dodge trains, grab coins, and chase a new high score.</p>
      <button id="playButton" class="primary-btn">Play</button>
      <div class="menu-stats">
        <span>Best <strong id="bestScore">0</strong></span>
        <span>Coins <strong id="bankCoins">0</strong></span>
      </div>
    </section>

    <section id="hud" class="hud hidden">
      <button id="pauseButton" class="icon-btn" aria-label="Pause">II</button>
      <div class="score-box">
        <span id="multiplier">x1</span>
        <strong id="score">000000</strong>
      </div>
      <div class="coin-box">
        <span class="coin-dot"></span>
        <strong id="coins">0</strong>
      </div>
    </section>

    <section id="gameOver" class="panel over-panel hidden">
      <h2>Run Over</h2>
      <p>Score <strong id="finalScore">0</strong></p>
      <p>Coins <strong id="finalCoins">0</strong></p>
      <button id="restartButton" class="primary-btn">Run Again</button>
    </section>
  </main>

  <script src="game.js"></script>
</body>
</html>
