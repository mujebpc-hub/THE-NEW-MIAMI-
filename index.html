<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MIAMI - GTA Inspired Browser Game</title>
  <!-- Three.js CDN -->
  <script src="https://cdn.jsdelivr.net/npm/three@latest/build/three.min.js"></script>
  <style>
    /* Reset and basic styles */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      font-family: Arial, sans-serif;
      overflow: hidden;
      background-color: #000;
    }

    /* Loader styles */
    #loadingScreen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      z-index: 9999;
    }

    #progressBarContainer {
      width: 80%;
      max-width: 400px;
      height: 20px;
      background: #444;
      border-radius: 10px;
      overflow: hidden;
      margin-top: 20px;
    }

    #progressBar {
      height: 100%;
      width: 0%;
      background: #00ff00;
      transition: width 0.3s;
    }

    /* Main container for game and UI */
    #gameContainer {
      width: 100%;
      height: 100%;
      position: relative;
    }

    /* Main menu styles */
    #mainMenu {
      position: fixed;
      top: 0;
      left:0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.8);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9000;
    }

    #mainMenu h1 {
      color: #fff;
      font-size: 3em;
      margin-bottom: 30px;
    }

    #mainMenu button {
      background: #333;
      color: #fff;
      border: none;
      padding: 15px 30px;
      font-size: 1.2em;
      margin: 10px 0;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.3s;
    }

    #mainMenu button:hover {
      background: #555;
    }

    /* Overlay for pause, inventory, settings, etc. */
    .overlay {
      position: fixed;
      top:0; left:0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.7);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9500;
    }

    /* HUD styles */
    #hud {
      position: absolute;
      top: 0;
      width: 100%;
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      padding: 10px;
      z-index: 1000;
    }

    /* Left HUD panel */
    #hudLeft {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    /* Health and armor bars */
    .statusBarContainer {
      background: #222;
      border-radius: 4px;
      width: 200px;
      height: 20px;
      overflow: hidden;
      position: relative;
    }

    .statusBar {
      height: 100%;
      width: 100%;
      background: green;
      transition: width 0.3s;
    }

    /* HUD right side */
    #hudRight {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 8px;
    }

    /* Money display */
    #moneyDisplay {
      background: rgba(0,0,0,0.5);
      padding: 5px 10px;
      border-radius: 4px;
      color: #fff;
      font-size: 1.2em;
    }

    /* Wanted stars */
    #wantedStars {
      display: flex;
      gap: 5px;
    }

    .star {
      width: 20px;
      height: 20px;
      background: yellow;
      clip-path: polygon(
        50% 0%,
        61% 35%,
        98% 35%,
        68% 57%,
        79% 91%,
        50% 70%,
        21% 91%,
        32% 57%,
        2% 35%,
        39% 35%
      );
    }

    /* Mission text */
    #missionText {
      background: rgba(0,0,0,0.5);
      padding: 8px 12px;
      border-radius: 4px;
      color: #fff;
      font-size: 1em;
    }

    /* FPS counter and minimap container */
    #fpsCounter {
      background: rgba(0,0,0,0.5);
      padding: 4px 8px;
      border-radius: 4px;
      color: #0f0;
      font-family: monospace;
    }

    #minimapContainer {
      width: 150px;
      height: 150px;
      background: #222;
      border: 2px solid #555;
      border-radius: 8px;
    }

    /* Mobile controls styles */
    #mobileControls {
      position: fixed;
      bottom: 0;
      width: 100%;
      display: flex;
      justify-content: space-around;
      align-items: flex-end;
      padding: 10px;
      z-index: 9000;
      pointer-events: none; /* allow pointer events only on buttons */
    }

    .control-area {
      display: flex;
      gap: 10px;
      pointer-events: auto;
    }

    /* Joystick area */
    #joystickArea {
      width: 80px;
      height: 80px;
      background: rgba(255,255,255,0.2);
      border-radius: 50%;
    }

    /* Action buttons */
    .actionButton {
      width: 60px;
      height: 60px;
      background: rgba(255,255,255,0.2);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2em;
      color: #fff;
      cursor: pointer;
      user-select: none;
    }

    /* Additional control buttons styles */
    #enterVehicleBtn, #jumpBtn, #sprintBtn {
      width: 60px;
      height: 60px;
      background: rgba(255,255,255,0.2);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2em;
      color: #fff;
      cursor: pointer;
      user-select: none;
    }

    /* Pause menu styles */
    #pauseMenu {
      position: fixed;
      top:0; left:0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.9);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9500;
    }

    #pauseMenu h2 {
      color: #fff;
      font-size: 2em;
      margin-bottom: 20px;
    }

    #pauseMenu button {
      background: #333;
      color: #fff;
      border: none;
      padding: 15px 30px;
      font-size: 1.2em;
      margin: 10px 0;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.3s;
    }

    #pauseMenu button:hover {
      background: #555;
    }

    /* Popup styles for mission complete and game over */
    .popup {
      position: fixed;
      top:50%;
      left:50%;
      transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.95);
      padding: 30px;
      border-radius: 10px;
      display: none;
      flex-direction: column;
      align-items: center;
      z-index: 10000;
      color: #fff;
      text-align: center;
    }

    .popup h2 {
      margin-bottom: 20px;
    }

    .popup button {
      margin-top: 20px;
      padding: 10px 20px;
      font-size: 1em;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      background: #333;
      color: #fff;
      transition: background 0.3s;
    }

    .popup button:hover {
      background: #555;
    }

    /* Notification system styles */
    #notificationContainer {
      position: fixed;
      top: 20px;
      right: 20px;
      width: 250px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      z-index: 10000;
    }

    .notification {
      background: rgba(0,0,0,0.8);
      padding: 10px 15px;
      border-radius: 5px;
      color: #fff;
      font-size: 1em;
      box-shadow: 0 0 10px rgba(0,0,0,0.5);
      opacity: 0;
      animation: fadeInOut 3s forwards;
    }

    @keyframes fadeInOut {
      0% { opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { opacity: 0; }
    }

    /* Inventory window styles */
    #inventoryWindow {
      position: fixed;
      top:50%;
      left:50%;
      transform: translate(-50%, -50%);
      background: #222;
      padding: 20px;
      border-radius: 10px;
      width: 80%;
      max-width: 600px;
      height: 70%;
      display: none;
      flex-direction: column;
      overflow-y: auto;
      z-index: 10000;
    }

    #inventoryWindow h3 {
      margin-bottom: 15px;
      color: #fff;
    }

    #inventoryItems {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .inventoryItem {
      background: #444;
      padding: 10px;
      border-radius: 5px;
      flex: 1 1 30%;
      color: #fff;
      text-align: center;
    }

    /* Vehicle speedometer container */
    #speedometerContainer {
      position: absolute;
      bottom: 80px;
      right: 20px;
      width: 120px;
      height: 60px;
      background: rgba(0,0,0,0.5);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2em;
      color: #fff;
      z-index: 1000;
    }

    /* Responsive adjustments for mobile */
    @media (max-width: 768px) {
      #mobileControls {
        justify-content: space-around;
      }
    }
  </style>
</head>
<body>
  <!-- Loading Screen -->
  <div id="loadingScreen">
    <h2 style="color:#fff;">Loading...</h2>
    <div id="progressBarContainer">
      <div id="progressBar"></div>
    </div>
  </div>

  <!-- Main Menu -->
  <div id="mainMenu">
    <h1>MIAMI</h1>
    <button id="btnPlay">Play</button>
    <button id="btnContinue">Continue</button>
    <button id="btnSettings">Settings</button>
    <button id="btnCredits">Credits</button>
  </div>

  <!-- Game Container -->
  <div id="gameContainer">
    <!-- Three.js Canvas will be appended here -->
  </div>

  <!-- HUD -->
  <div id="hud">
    <!-- Left Side: Status bars -->
    <div id="hudLeft">
      <div id="healthContainer" class="statusBarContainer" title="Health">
        <div id="healthBar" class="statusBar" style="background: green; width:100%;"></div>
      </div>
      <div id="armorContainer" class="statusBarContainer" title="Armor">
        <div id="armorBar" class="statusBar" style="background: blue; width:100%;"></div>
      </div>
    </div>
    <!-- Right Side: Money, wanted stars, mission, FPS, minimap -->
    <div id="hudRight">
      <div id="moneyDisplay">Money: $0</div>
      <div id="wantedStars">
        <div class="star" title="Wanted Level 1"></div>
        <div class="star" title="Wanted Level 2"></div>
        <div class="star" title="Wanted Level 3"></div>
        <div class="star" title="Wanted Level 4"></div>
        <div class="star" title="Wanted Level 5"></div>
      </div>
      <div id="missionText">Mission: None</div>
      <div id="fpsCounter">FPS: 0</div>
      <div id="minimapContainer"></div>
    </div>
  </div>

  <!-- Vehicle Speedometer -->
  <div id="speedometerContainer">Speed: 0 km/h</div>

  <!-- Mobile Controls -->
  <div id="mobileControls">
    <div class="control-area">
      <div id="joystickArea"></div>
    </div>
    <div class="control-area">
      <div id="enterVehicleBtn" class="actionButton" title="Enter Vehicle">🚗</div>
      <div id="jumpBtn" class="actionButton" title="Jump">⤴️</div>
      <div id="sprintBtn" class="actionButton" title="Sprint">🏃‍♂️</div>
    </div>
  </div>

  <!-- Overlay for Pause Menu -->
  <div id="pauseMenu" class="overlay">
    <div>
      <h2>Game Paused</h2>
      <button id="resumeBtn">Resume</button>
      <button id="mainMenuBtn">Main Menu</button>
    </div>
  </div>

  <!-- Mission Completed Popup -->
  <div id="missionCompletePopup" class="popup">
    <h2>Mission Completed!</h2>
    <button id="nextMissionBtn">Next Mission</button>
  </div>

  <!-- Game Over Screen -->
  <div id="gameOverScreen" class="popup">
    <h2>Game Over</h2>
    <button id="restartBtn">Restart</button>
    <button id="mainMenuBtn2">Main Menu</button>
  </div>

  <!-- Audio Elements -->
  <audio id="bgMusic" src="your-background-music.mp3" loop></audio>
  <audio id="sfx" src="your-sfx.mp3"></audio>

  <!-- Notification System -->
  <div id="notificationContainer"></div>

  <!-- Inventory Window -->
  <div id="inventoryWindow">
    <h3>Inventory</h3>
    <div id="inventoryItems">
      <!-- Inventory items will be added here dynamically -->
    </div>
    <button id="closeInventoryBtn">Close</button>
  </div>

  <!-- Scripts (you can replace with your game.js) -->
 <script>

let scene = new THREE.Scene();

scene.background = new THREE.Color(0x87CEEB);

let camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
5000
);

let renderer = new THREE.WebGLRenderer({
antialias:true
});

renderer.setSize(
window.innerWidth,
window.innerHeight
);

document.getElementById("gameContainer")
.appendChild(renderer.domElement);

// LIGHT

const ambient = new THREE.AmbientLight(
0xffffff,
1
);

scene.add(ambient);

const sun = new THREE.DirectionalLight(
0xffffff,
2
);

sun.position.set(100,200,100);

scene.add(sun);

// GRASS TEXTURE

const loader = new THREE.TextureLoader();

const grass = loader.load("grass.jpg.jpg");

grass.wrapS = THREE.RepeatWrapping;
grass.wrapT = THREE.RepeatWrapping;

grass.repeat.set(100,100);

// LAND

const ground = new THREE.Mesh(
new THREE.PlaneGeometry(
5000,
5000
),
new THREE.MeshStandardMaterial({
map:grass
})
);

ground.rotation.x = -Math.PI/2;

scene.add(ground);

// PLAYER

const player = new THREE.Mesh(
new THREE.BoxGeometry(
5,
10,
5
),
new THREE.MeshStandardMaterial({
color:0xff0000
})
);

player.position.y = 5;

scene.add(player);

// BUILDINGS

for(let i=0;i<300;i++){

let h = 20 + Math.random()*120;

const b = new THREE.Mesh(
new THREE.BoxGeometry(
20+Math.random()*30,
h,
20+Math.random()*30
),
new THREE.MeshStandardMaterial({
color:Math.random()*0xffffff
})
);

b.position.set(
(Math.random()-0.5)*3000,
h/2,
(Math.random()-0.5)*3000
);

scene.add(b);
}

// CAMERA

camera.position.set(
0,
30,
50
);

const keys = {};

window.addEventListener(
"keydown",
e=>keys[e.key.toLowerCase()] = true
);

window.addEventListener(
"keyup",
e=>keys[e.key.toLowerCase()] = false
);

function animate(){

requestAnimationFrame(animate);

if(keys["w"])
player.position.z -= 2;

if(keys["s"])
player.position.z += 2;

if(keys["a"])
player.position.x -= 2;

if(keys["d"])
player.position.x += 2;

camera.position.x = player.position.x;
camera.position.z = player.position.z + 50;

camera.lookAt(player.position);

renderer.render(
scene,
camera
);

}

animate();

</script>
</body>
</html>
